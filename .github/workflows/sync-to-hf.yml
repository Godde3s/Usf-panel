name: Sync to HuggingFace Space

# This workflow automatically syncs the GitHub repo to a HuggingFace Space.
# Setup: Add a repository secret named `HF_TOKEN` with a HuggingFace Write token.
# Get one at: https://huggingface.co/settings/tokens

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Sync to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          import sys
          from huggingface_hub import HfApi, whoami

          token = os.environ.get("HF_TOKEN")
          if not token:
              print("ERROR: HF_TOKEN secret is not set")
              sys.exit(1)

          # Verify token
          try:
              info = whoami(token=token)
              username = info["name"]
              print(f"Authenticated as: {username}")
          except Exception as e:
              print(f"ERROR: Token verification failed: {e}")
              sys.exit(1)

          space_name = "usf"
          repo_id = f"{username}/{space_name}"
          print(f"Target Space: {repo_id}")

          api = HfApi(token=token)

          # Create the Space if it does not exist
          try:
              api.create_repo(
                  repo_id=repo_id,
                  repo_type="space",
                  space_sdk="docker",
                  private=False,
                  exist_ok=True,
              )
              print(f"Space ready: {repo_id}")
          except Exception as e:
              print(f"create_repo warning: {e}")

          # Upload all files (excluding .github, .git, __pycache__, README.md, LICENSE, docs/)
          import fnmatch
          EXCLUDE_DIRS = [".git", ".github", "__pycache__", "docs"]
          EXCLUDE_FILES = ["README.md", "LICENSE", "*.pyc", ".gitignore", ".gitattributes", ".nojekyll"]
          def should_include(rel_path):
              for pat in EXCLUDE_FILES:
                  if fnmatch.fnmatch(rel_path, pat):
                      return False
              return True

          files_to_upload = []
          for root, dirs, files in os.walk("."):
              dirs[:] = [d for d in dirs if d not in EXCLUDE_DIRS]
              for f in files:
                  if f.endswith(".pyc"):
                      continue
                  full_path = os.path.join(root, f)
                  rel_path = os.path.relpath(full_path, ".")
                  if should_include(rel_path):
                      files_to_upload.append((full_path, rel_path))

          print(f"Uploading {len(files_to_upload)} files...")
          for full, rel in files_to_upload:
              print(f"  -> {rel}")
              try:
                  api.upload_file(
                      path_or_fileobj=full,
                      path_in_repo=rel,
                      repo_id=repo_id,
                      repo_type="space",
                      token=token,
                  )
              except Exception as e:
                  print(f"    WARNING: {e}")

          # Write HF-specific README.md with proper YAML frontmatter
          print("Writing HF-specific README.md...")
          hf_readme = """---
title: Usf Panel
emoji: \U0001F53A
colorFrom: yellow
colorTo: indigo
sdk: docker
app_port: 7860
pinned: true
license: mit
---

# Usf Panel

Premium VLESS Tunnel & Subscription Manager

Auto-synced from https://github.com/Godde3s/Usf-panel

## Login
- Username: admin
- Password: (set via ADMIN_PASSWORD secret - default: admin)

Change the password immediately after first login!

## Documentation
Full docs: https://github.com/Godde3s/Usf-panel
One-click deploy page: https://godde3s.github.io/Usf-panel
"""
          api.upload_file(
              path_or_fileobj=hf_readme.encode(),
              path_in_repo="README.md",
              repo_id=repo_id,
              repo_type="space",
              token=token,
          )
          print("  README.md (HF metadata) uploaded")

          # Set secrets (idempotent)
          print("Setting secrets...")
          for key, value in [
              ("ADMIN_USERNAME", "admin"),
              ("ADMIN_PASSWORD", "admin"),
              ("SECRET_KEY", "Usf-prod-secret-key-2026-do-not-change-xyz789abc123def456ghi789jkl012mno345pqr678stu901vwx234yz"),
          ]:
              try:
                  api.add_space_secret(repo_id=repo_id, key=key, value=value, token=token)
                  print(f"  OK {key}")
              except Exception as e:
                  print(f"  WARN {key}: {e}")

          # Restart the Space to pick up changes
          try:
              api.restart_space(repo_id=repo_id, token=token)
              print("Space restart triggered")
          except Exception as e:
              print(f"Restart warning: {e}")

          print(f"\nSync complete! Space URL: https://{username}-{space_name}.hf.space")
          EOF
